<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Solar Pro Engineering Suite</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #10b981; --secondary: #6366f1; --danger: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        h1, h2 { color: var(--primary); margin-top: 0; }
        .subtitle { color: #94a3b8; margin-top: -10px; margin-bottom: 20px; }

        #map { height: 350px; border-radius: 12px; border: 2px solid #334155; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        .field-box { display: flex; background: #0f172a; border-radius: 8px; border: 1px solid #475569; overflow: hidden; }
        .field-box input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; text-align: right; }
        .field-box span { background: #334155; padding: 10px; font-size: 0.8rem; min-width: 50px; text-align: center; }

        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-calc { background: var(--primary); color: #064e3b; }
        .btn-pdf { background: var(--secondary); color: white; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        #result-panel { font-family: monospace; font-size: 0.9rem; line-height: 1.6; color: #5eead4; background: #020617; padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary); }
        canvas { background: white; border-radius: 12px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ Solar Engineering <span style="color:white">Pro Suite</span></h1>
        <p class="subtitle">Design, Analysis & Professional Reporting</p>
    </header>

    <div id="map"></div>

    <div class="grid">
        <div class="card">
            <h2>🌍 Site Specs</h2>
            <div class="input-group">
                <label>Lat / Lon</label>
                <div class="field-box"><input id="lat" value="13.75" readonly><input id="lon" value="100.5" readonly></div>
            </div>
            <div class="input-group">
                <label>Tilt / Azimuth</label>
                <div class="field-box"><input id="tilt" value="15"><span>°</span><input id="azi" value="180"><span>°</span></div>
            </div>
        </div>

        <div class="card">
            <h2>☀️ PV & Inverter</h2>
            <div class="input-group">
                <label>Pmax / Voc / Isc (Panel)</label>
                <div class="field-box"><input id="pWp" value="550"><input id="pVoc" value="49.8"><input id="pIsc" value="13.9"></div>
            </div>
            <div class="input-group">
                <label>Qty / Panels per String</label>
                <div class="field-box"><input id="pQty" value="20"><input id="pStr" value="10"></div>
            </div>
        </div>

        <div class="card">
            <h2>🔋 Safety & Battery</h2>
            <div class="input-group">
                <label>Inv. Max Voc / Max Isc</label>
                <div class="field-box"><input id="invMaxV" value="1000"><input id="invMaxI" value="15"></div>
            </div>
            <div class="input-group">
                <label>Battery (kWh) / Unit Price</label>
                <div class="field-box"><input id="batKwh" value="10"><input id="ePrice" value="4.7"></div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-calc" onclick="runAnalysis()">⚡ RUN ANALYSIS</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 EXPORT PDF REPORT</button>
    </div>

    <div class="grid">
        <div class="card">
            <h2>📝 Summary</h2>
            <div id="result-panel">Waiting for input...</div>
        </div>
        <div class="card">
            <h2>📈 Yield Analysis</h2>
            <canvas id="yieldChart"></canvas>
        </div>
    </div>
</div>

<script>
let map, marker, chart;
let lastResult = null;

// Initialize Map
function initMap() {
    map = L.map('map').setView([13.75, 100.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([13.75, 100.5]).addTo(map);
    map.on('click', e => {
        const {lat, lng} = e.latlng;
        document.getElementById('lat').value = lat.toFixed(4);
        document.getElementById('lon').value = lng.toFixed(4);
        marker.setLatLng([lat, lng]);
    });
}

// Engineering Logic
async function runAnalysis() {
    const v = id => parseFloat(document.getElementById(id).value);
    
    // Calculations
    const sysSize = (v('pWp') * v('pQty')) / 1000;
    const strVoc = v('pVoc') * v('pStr');
    const isSafeV = strVoc <= v('invMaxV');
    const pr = 0.78; // Performance Ratio average
    
    const hspThai = [5.1, 5.5, 5.8, 6.1, 5.4, 5.0, 4.8, 4.7, 4.6, 5.0, 5.1, 5.1];
    let monthlyGen = [];
    let yearlySum = 0;

    hspThai.forEach((hsp, i) => {
        const energy = hsp * sysSize * pr * 30;
        monthlyGen.push(energy.toFixed(1));
        yearlySum += energy;
    });

    const yearlySaving = yearlySum * v('ePrice');

    // Display
    document.getElementById('result-panel').innerHTML = `
        System Size: ${sysSize.toFixed(2)} kWp<br>
        Annual Gen: ${yearlySum.toLocaleString()} kWh<br>
        Annual Saving: ${yearlySaving.toLocaleString()} THB<br>
        String Voc: ${strVoc.toFixed(1)}V [${isSafeV ? 'SAFE' : 'DANGER'}]
    `;

    renderChart(monthlyGen);
    
    // Store data for PDF
    lastResult = { sysSize, yearlySum, yearlySaving, monthlyGen, strVoc, isSafeV };
}

function renderChart(data) {
    const ctx = document.getElementById('yieldChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ label: 'Yield (kWh)', data: data, backgroundColor: '#10b981' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// Professional PDF Export
function exportPDF() {
    if (!lastResult) return alert("Please run analysis first!");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const primaryColor = [16, 185, 129]; // #10b981

    // Header
    doc.setFillColor(...primaryColor);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.text("SOLAR ENGINEERING REPORT", 20, 25);
    
    // System Overview Table
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(14);
    doc.text("1. System Summary", 20, 55);
    
    doc.autoTable({
        startY: 60,
        head: [['Parameter', 'Value', 'Unit']],
        body: [
            ['System Capacity', lastResult.sysSize.toFixed(2), 'kWp'],
            ['Estimated Annual Yield', lastResult.yearlySum.toLocaleString(), 'kWh'],
            ['Annual Financial Saving', lastResult.yearlySaving.toLocaleString(), 'THB'],
            ['String Voltage (Voc)', lastResult.strVoc.toFixed(1), 'V'],
            ['Safety Status', lastResult.isSafeV ? 'PASSED' : 'WARNING', '']
        ],
        theme: 'striped',
        headStyles: { fillColor: primaryColor }
    });

    // Monthly Yield Table
    doc.text("2. Monthly Energy Production", 20, doc.lastAutoTable.finalY + 15);
    
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const monthlyTable = months.map((m, i) => [m, lastResult.monthlyGen[i]]);

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 20,
        head: [['Month', 'Production (kWh)']],
        body: monthlyTable,
        theme: 'grid',
        headStyles: { fillColor: [99, 102, 241] } // Secondary color
    });

    // Footer
    doc.setFontSize(10);
    doc.setTextColor(150);
    doc.text("Generated by Solar Engineering Suite Pro", 20, 285);

    doc.save(`Solar_Report_${new Date().getTime()}.pdf`);
}

window.onload = initMap;
</script>
</body>
</html>
