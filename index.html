<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Solar Pro Master Command v11.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Kanit:wght@300;500;700&display=swap');

        :root { 
            --accent: #00f2fe; --success: #00ff87; --danger: #ff4b2b;
            --glass: rgba(10, 15, 25, 0.82); --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Kanit', sans-serif; color: #e2e8f0;
            background: url('image_0.png') no-repeat center center fixed; background-size: cover;
        }

        .dashboard { display: grid; grid-template-columns: 400px 1fr; gap: 25px; max-width: 1650px; margin: auto; }

        /* Glass Panels */
        .panel { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h2 { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 20px 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Input Styling */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { display: block; font-size: 0.65rem; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        
        .field { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            border-radius: 10px; display: flex; overflow: hidden; transition: 0.3s;
        }
        .field:focus-within { border-color: var(--accent); box-shadow: 0 0 12px rgba(0, 242, 254, 0.3); }
        .field input, .field select { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; }
        .field span { background: rgba(255,255,255,0.05); padding: 12px; font-size: 0.7rem; color: #64748b; min-width: 45px; text-align: center; border-left: 1px solid var(--border); }

        /* Buttons */
        .btn { padding: 18px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 100%; font-size: 0.9rem; }
        .btn-main { background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3); }
        .btn-pdf { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); margin-top: 12px; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* Stats & Map */
        #map { height: 320px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 25px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-box { background: rgba(255,255,255,0.03); border-radius: 18px; padding: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: bold; color: #fff; display: block; }
        .stat-unit { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-top: 5px; display: block; }

        /* Validation UI */
        .v-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .status { padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .ok { background: rgba(0, 255, 135, 0.15); color: var(--success); }
        .err { background: rgba(255, 75, 43, 0.15); color: var(--danger); }

        #chart-area { height: 380px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar" style="display:flex; flex-direction:column; gap:25px;">
        <div class="panel">
            <h1 style="font-size: 1.6rem; margin:0 0 25px 0; font-weight:900;">SOLAR <span style="color:var(--accent)">COMMAND</span></h1>
            
            <h2>🛠️ COMPONENT CONFIG</h2>
            <label>Module Database</label>
            <div class="field" style="margin-bottom:15px;">
                <select id="pSel" onchange="applyPreset()">
                    <option value="custom">-- Custom Specification --</option>
                    <option value="jinko550">Jinko Tiger Pro 550W</option>
                    <option value="longi545">LONGi Hi-MO 5 545W</option>
                </select>
            </div>
            
            <div class="input-row">
                <div><label>Pmax (Wp)</label><div class="field"><input id="pWp" value="550"></div></div>
                <div><label>Voc (V)</label><div class="field"><input id="pVoc" value="49.8"></div></div>
            </div>
            <div class="input-row">
                <div><label>Vmp (V)</label><div class="field"><input id="pVmp" value="41.9"></div></div>
                <div><label>Isc (A)</label><div class="field"><input id="pIsc" value="13.9"></div></div>
            </div>
            <div class="input-row">
                <div><label>Quantity</label><div class="field"><input id="pQty" value="20"></div></div>
                <div><label>Series/Str</label><div class="field"><input id="pStr" value="10"></div></div>
            </div>

            <h2 style="margin-top:20px;">🔌 INVERTER SYSTEM</h2>
            <div class="input-row">
                <div><label>Max DC Input</label><div class="field"><input id="invMaxV" value="1100"><span>V</span></div></div>
                <div><label>MPPT Range</label><div class="field"><input id="invMaxM" value="950"><span>V</span></div></div>
            </div>

            <button class="btn btn-main" onclick="runSimulation()">🚀 EXECUTE ANALYSIS</button>
            <button class="btn btn-pdf" onclick="generatePDF()">📄 EXPORT PDF REPORT</button>
        </div>

        <div class="panel">
            <h2>🛡️ ENGINEERING VALIDATION</h2>
            <div id="validationBox">
                <div class="v-row"><span>Voltage Safety</span><span class="status ok">READY</span></div>
                <div class="v-row"><span>Current Limit</span><span class="status ok">READY</span></div>
            </div>
        </div>
    </div>

    <div class="main">
        <div id="map"></div>

        <div class="stat-grid">
            <div class="stat-box"><span class="stat-val" id="stSize">0.00</span><span class="stat-unit">System kWp</span></div>
            <div class="stat-box"><span class="stat-val" id="stYield">0</span><span class="stat-unit">Annual kWh</span></div>
            <div class="stat-box"><span class="stat-val" id="stSave">฿ 0</span><span class="stat-unit">Annual Saving</span></div>
            <div class="stat-box"><span class="stat-val" id="stROI">0.0</span><span class="stat-unit">Years Payback</span></div>
        </div>

        <div class="panel">
            <h2>📊 25-YEAR PERFORMANCE PROJECTION</h2>
            <div id="chart-area"><canvas id="mainChart"></canvas></div>
        </div>
        
        <div class="panel" style="margin-top:25px;">
            <h2>📝 PROJECT BRANDING</h2>
            <div class="input-row">
                <div><label>Client Name</label><div class="field"><input id="custName" placeholder="Enter name..."></div></div>
                <div><label>Upload Logo</label><div class="field"><input type="file" id="logoInp" style="font-size:0.7rem; padding:8px;"></div></div>
            </div>
            <div class="input-row">
                <div><label>CAPEX Investment (THB)</label><div class="field"><input id="totalCost" value="350000"></div></div>
                <div><label>Notes</label><div class="field"><input id="notes" placeholder="Engineering remarks..."></div></div>
            </div>
        </div>
    </div>
</div>

<script>
let chart, map, marker, logoBase64 = null;

window.onload = () => {
    map = L.map('map').setView([13.75, 100.5], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    marker = L.marker([13.75, 100.5], {draggable:true}).addTo(map);
    
    document.getElementById('logoInp').onchange = (e) => {
        let r = new FileReader(); r.onload = (el) => logoBase64 = el.target.result;
        r.readAsDataURL(e.target.files[0]);
    };
    runSimulation();
};

function applyPreset() {
    const db = { jinko550: [550, 49.8, 41.9, 13.9], longi545: [545, 49.5, 41.6, 13.8] };
    let c = db[document.getElementById('pSel').value];
    if(c) ['pWp','pVoc','pVmp','pIsc'].forEach((id, i) => document.getElementById(id).value = c[i]);
}

function runSimulation() {
    const g = (id) => parseFloat(document.getElementById(id).value) || 0;
    
    // Engineering Physics
    const size = (g('pWp') * g('pQty')) / 1000;
    const strVoc = g('pVoc') * g('pStr');
    const strVmp = g('pVmp') * g('pStr');
    
    // Efficiency Matrix (TH Context)
    const pr = 0.98 * 0.88 * 0.92; // Inv * Temp Loss * Misc
    const yearlyYield = size * 5.1 * 365 * pr;
    const saving = yearlyYield * 4.7;
    const roi = g('totalCost') / saving;

    // UI Updates
    document.getElementById('stSize').innerText = size.toFixed(2);
    document.getElementById('stYield').innerText = Math.round(yearlyYield).toLocaleString();
    document.getElementById('stSave').innerText = "฿ " + Math.round(saving).toLocaleString();
    document.getElementById('stROI').innerText = roi.toFixed(1);

    // Engineering Checks
    const vCheck = strVoc < g('invMaxV');
    const mCheck = strVmp < g('invMaxM');
    
    document.getElementById('validationBox').innerHTML = `
        <div class="v-row"><span>DC Voltage (Voc: ${strVoc.toFixed(1)}V)</span><span class="status ${vCheck?'ok':'err'}">${vCheck?'PASS':'OVER'}</span></div>
        <div class="v-row"><span>MPPT Range (Vmp: ${strVmp.toFixed(1)}V)</span><span class="status ${mCheck?'ok':'err'}">${mCheck?'OPTIMAL':'DANGER'}</span></div>
    `;

    updateChart(yearlyYield);
}

function updateChart(base) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(chart) chart.destroy();
    
    let labels = [], data = [];
    for(let i=1; i<=25; i++) { labels.push("Y" + i); data.push((base * Math.pow(0.995, i-1)).toFixed(0)); }

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Yield (kWh)', data: data,
                borderColor: '#00f2fe', backgroundColor: 'rgba(0, 242, 254, 0.1)',
                fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                x: { grid: { display: false }, ticks: { color: '#64748b' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const g = (id) => document.getElementById(id).value;
    
    // Header
    doc.setFillColor(10, 15, 25);
    doc.rect(0, 0, 210, 45, 'F');
    if(logoBase64) doc.addImage(logoBase64, 'PNG', 165, 8, 30, 30);
    
    doc.setTextColor(0, 242, 254);
    doc.setFontSize(22); doc.text("SOLAR ENGINEERING MASTER REPORT", 15, 25);
    doc.setTextColor(200); doc.setFontSize(10); doc.text(`CLIENT: ${g('custName') || 'N/A'}`, 15, 35);

    doc.autoTable({
        startY: 55,
        head: [['Specification', 'Result', 'Unit']],
        body: [
            ['System Capacity', document.getElementById('stSize').innerText, 'kWp'],
            ['Estimated Yield', document.getElementById('stYield').innerText, 'kWh/Year'],
            ['Annual Saving', document.getElementById('stSave').innerText, 'THB'],
            ['Payback Period', document.getElementById('stROI').innerText, 'Years'],
            ['String Voltage (Voc)', (parseFloat(g('pVoc')) * parseFloat(g('pStr'))).toFixed(1), 'VDC']
        ],
        theme: 'striped', headStyles: {fillColor: [10, 15, 25]}
    });
    
    doc.save(`Report_${g('custName') || 'Solar'}.pdf`);
}
</script>
</body>
</html>
