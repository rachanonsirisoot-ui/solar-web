<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Solar Engineer Tool</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

h2 {
    color: #38bdf8;
    margin-bottom: 10px;
}

/* INPUT GROUP */
.input-group {
    display: flex;
    align-items: center;
    margin: 6px 0;
}

.input-group input, .input-group select {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    border-radius: 8px 0 0 8px;
}

.input-group span {
    background: #334155;
    padding: 10px 12px;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
}

/* RESULT */
.result {
    line-height: 1.8;
    font-size: 15px;
}

/* MOBILE */
@media(max-width:600px){
    body { padding: 10px; }
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Solar System Design Tool</h1>

<!-- SOLAR -->
<div class="box">
<h2>☀️ Solar</h2>

<div class="input-group">
<input type="number" id="load" placeholder="โหลดไฟ">
<span>kWh/วัน</span>
</div>

<div class="input-group">
<input type="number" id="sun" value="5" placeholder="Peak Sun Hour">
<span>hr/day</span>
</div>

<div class="input-group">
<input type="number" id="panel" value="535" placeholder="กำลังแผง">
<span>W</span>
</div>

<div class="input-group">
<input type="number" id="eff" value="80" placeholder="Efficiency">
<span>%</span>
</div>

<div class="input-group">
<input type="number" id="stringSize" value="19" placeholder="แผง/สตริง">
<span>panel</span>
</div>

</div>

<!-- SYSTEM -->
<div class="box">
<h2>🔋 System</h2>

<div class="input-group">
<select id="systemType">
<option value="off">Off-grid</option>
<option value="on">On-grid</option>
<option value="hybrid">Hybrid</option>
</select>
<span>mode</span>
</div>

<div class="input-group">
<input type="number" id="voltage" value="48" placeholder="แรงดันแบต">
<span>V</span>
</div>

<div class="input-group">
<input type="number" id="backup" value="5" placeholder="สำรองไฟ">
<span>hr</span>
</div>

<div class="input-group">
<input type="number" id="dod" value="80" placeholder="DOD">
<span>%</span>
</div>

</div>

<!-- CABLE -->
<div class="box">
<h2>🔌 Cable</h2>

<div class="input-group">
<input type="number" id="distance" value="20" placeholder="ระยะสาย">
<span>m</span>
</div>

</div>

<!-- FINANCE -->
<div class="box">
<h2>💰 Financial</h2>

<div class="input-group">
<input type="number" id="price" value="4" placeholder="ค่าไฟ">
<span>บาท/kWh</span>
</div>

<div class="input-group">
<input type="number" id="cost" placeholder="ค่าติดตั้ง">
<span>บาท</span>
</div>

</div>

<button onclick="calc()">⚡ คำนวณระบบ</button>

<div class="box">
<h2>📊 Result</h2>
<div class="result" id="result"></div>
</div>

</div>

<script>
function calc() {

let load = +document.getElementById("load").value;
let sun = +document.getElementById("sun").value;
let panel = +document.getElementById("panel").value;
let eff = +document.getElementById("eff").value / 100;
let stringSize = +document.getElementById("stringSize").value;

let voltage = +document.getElementById("voltage").value;
let backup = +document.getElementById("backup").value;
let dod = +document.getElementById("dod").value / 100;

let distance = +document.getElementById("distance").value;

let price = +document.getElementById("price").value;
let cost = +document.getElementById("cost").value;

let systemType = document.getElementById("systemType").value;

// ===== SOLAR =====
let systemKW = (load / sun) / eff;
let panels = (systemKW * 1000) / panel;
let strings = panels / stringSize;

// ===== BATTERY =====
let batteryAh = 0;
let batteryCount = 0;

if(systemType !== "on") {
    batteryAh = (load * 1000 * backup) / (voltage * dod);
    batteryCount = batteryAh / 100;
}

// ===== INVERTER =====
let inverterKW = systemKW * 1.2;
let acCurrent = (inverterKW * 1000) / 230;

// ===== CABLE =====
let dcCable = 0;
if(systemType !== "on") {
    let dcCurrent = (systemKW * 1000) / voltage;
    let vdropDC = voltage * 0.03;
    dcCable = (2 * distance * dcCurrent) / (56 * vdropDC);
}

let vdropAC = 230 * 0.03;
let acCable = (2 * distance * acCurrent) / (56 * vdropAC);

// ===== FINANCE =====
let yearly = load * 365;
let saving = yearly * price;
let roi = cost / saving;

// ===== RESULT =====
document.getElementById("result").innerHTML =

"☀️ ระบบ: <b>" + systemType.toUpperCase() + "</b><br><br>" +

"🔋 Solar<br>" +
"ขนาด: " + systemKW.toFixed(2) + " kW<br>" +
"แผง: " + Math.ceil(panels) + "<br>" +
"String: " + Math.ceil(strings) + "<br><br>" +

(systemType !== "on" ?
"🔋 Battery<br>" +
"ความจุ: " + batteryAh.toFixed(0) + " Ah<br>" +
"แบต 100Ah: " + Math.ceil(batteryCount) + "<br><br>"
: "") +

"⚡ Inverter<br>" +
"ขนาด: " + inverterKW.toFixed(2) + " kW<br>" +
"กระแส: " + acCurrent.toFixed(2) + " A<br><br>" +

"🔌 Cable<br>" +
"DC: " + dcCable.toFixed(2) + " sq.mm<br>" +
"AC: " + acCable.toFixed(2) + " sq.mm<br><br>" +

"💰 Financial<br>" +
"ประหยัด/ปี: " + saving.toFixed(0) + " บาท<br>" +
"คืนทุน: " + roi.toFixed(1) + " ปี";
}
</script>

</body>
</html>
