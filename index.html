<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Solar Pro Engineering Suite | Full Version</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #10b981; --secondary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        .field { display: flex; background: #0f172a; border-radius: 6px; border: 1px solid #475569; overflow: hidden; }
        .field input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; text-align: right; }
        .field span { background: #334155; padding: 8px; font-size: 0.8rem; min-width: 50px; text-align: center; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-calc { background: var(--primary); color: #064e3b; }
        .btn-pdf { background: var(--secondary); color: white; }
        #result-display { background: #020617; padding: 15px; border-radius: 8px; font-family: monospace; border-left: 4px solid var(--primary); white-space: pre-wrap; }
        canvas { background: white; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Solar Pro <span style="color:var(--primary)">Engineering</span></h1>
    
    <div class="grid">
        <div class="card">
            <h3>🌍 Location & Panel</h3>
            <div class="input-group"><label>Lat / Lon</label>
                <div class="field"><input id="lat" value="13.75"><input id="lon" value="100.5"></div>
            </div>
            <div class="input-group"><label>Panel Wattage</label>
                <div class="field"><input id="pWp" value="550"><span>Wp</span></div>
            </div>
            <div class="input-group"><label>Total Panels / String Size</label>
                <div class="field"><input id="pQty" value="20"><input id="pStr" value="10"></div>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ System & Finance</h3>
            <div class="input-group"><label>Roof Tilt / Azimuth</label>
                <div class="field"><input id="tilt" value="15"><input id="azi" value="180"></div>
            </div>
            <div class="input-group"><label>Project Cost</label>
                <div class="field"><input id="cost" value="350000"><span>฿</span></div>
            </div>
            <div class="input-group"><label>Electricity Price</label>
                <div class="field"><input id="ePrice" value="4.7"><span>฿/unit</span></div>
            </div>
        </div>
    </div>

    <div class="grid" style="grid-template-columns: 2fr 1fr;">
        <button class="btn-calc" onclick="runApp()">⚡ เริ่มคำนวณ (Run Simulation)</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 Export PDF</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📊 ผลการวิเคราะห์</h3>
            <div id="result-display">กดปุ่มคำนวณเพื่อเริ่ม...</div>
        </div>
        <div class="card">
            <h3>📈 รายได้รายเดือน</h3>
            <canvas id="yieldChart" height="200"></canvas>
        </div>
    </div>
</div>

<script>
let chartInstance = null;
let savedData = null;

async function runApp() {
    const v = (id) => parseFloat(document.getElementById(id).value);
    const systemSize = (v('pWp') * v('pQty')) / 1000;
    
    let hspData = [];
    
    try {
        // ดึงข้อมูลจาก NASA
        const url = `https://power.larc.nasa.gov/api/temporal/monthly/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude=${v('lon')}&latitude=${v('lat')}&format=JSON`;
        const res = await fetch(url);
        if(!res.ok) throw new Error();
        const data = await res.json();
        const raw = data.properties.parameter.ALLSKY_SFC_SW_DWN;
        hspData = Object.values(raw).slice(0, 12);
    } catch (e) {
        console.warn("NASA API Error, using Thai average fallback.");
        // กรณี API ล่ม: ใช้ค่าเฉลี่ยแสงแดดในไทย (ประมาณ 4.5 - 5.5 HSP)
        hspData = [5.1, 5.4, 5.8, 5.9, 5.2, 4.8, 4.7, 4.6, 4.5, 4.9, 5.0, 5.0];
    }

    let monthlyKwh = [];
    let yearlyKwh = 0;
    const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

    hspData.forEach((hsp, i) => {
        const days = new Date(2024, i + 1, 0).getDate();
        const gen = hsp * systemSize * 0.8 * days; // 0.8 คือ Efficiency รวม (Inverter + Temp + Dust)
        monthlyKwh.push(gen.toFixed(1));
        yearlyKwh += gen;
    });

    const yearlySaving = yearlyKwh * v('ePrice');
    const payback = v('cost') / yearlySaving;

    // แสดงผล
    document.getElementById('result-display').innerHTML = 
        `ขนาดระบบ: ${systemSize.toFixed(2)} kWp\n` +
        `ผลิตไฟฟ้าได้: ${yearlyKwh.toLocaleString(undefined, {maximumFractionDigits:0})} หน่วย/ปี\n` +
        `ประหยัดเงิน: ${yearlySaving.toLocaleString(undefined, {maximumFractionDigits:0})} บาท/ปี\n` +
        `จุดคุ้มทุน: ${payback.toFixed(2)} ปี\n` +
        `ลดก๊าซ CO2: ${(yearlyKwh * 0.51).toFixed(2)} kg/ปี`;

    updateChart(months, monthlyKwh);
    savedData = { systemSize, yearlyKwh, yearlySaving, payback, monthlyKwh };
}

function updateChart(labels, data) {
    const ctx = document.getElementById('yieldChart');
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{ label: 'kWh', data: data, backgroundColor: '#10b981' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function exportPDF() {
    if(!savedData) return alert("กรุณากดคำนวณก่อน");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(20);
    doc.text("Solar Report Summary", 20, 20);
    doc.setFontSize(12);
    doc.text(`Capacity: ${savedData.systemSize} kWp`, 20, 40);
    doc.text(`Annual Yield: ${savedData.yearlyKwh.toFixed(0)} kWh`, 20, 50);
    doc.text(`Payback: ${savedData.payback.toFixed(2)} Years`, 20, 60);
    doc.save("solar-pro-report.pdf");
}
</script>
</body>
</html>
