<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Solar Master - Blue Edition v12.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Kanit:wght@300;500;700&display=swap');

        :root { 
            --primary-blue: #1e3a8a; /* Deep Blue */
            --accent-cyan: #06b6d4;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --glass-blue: rgba(30, 58, 138, 0.85); /* Glass Blue Overlay */
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Kanit', sans-serif; color: #f8fafc;
            /* พื้นหลังเป็นรูปภาพ แต่ซ้อนทับด้วยสีน้ำเงินเข้มเพื่อให้ตัวหนังสือเด่น */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(30, 58, 138, 0.8)), url('image_0.png');
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .container { max-width: 1400px; margin: auto; }

        /* Glass Panel Styling */
        .panel { 
            background: var(--glass-blue); backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        h2 { color: var(--accent-cyan); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-left: 4px solid var(--accent-cyan); padding-left: 10px; }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* Input Form Elements */
        label { display: block; font-size: 0.75rem; color: #cbd5e1; margin-bottom: 6px; font-weight: bold; }
        .input-field { 
            display: flex; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px; overflow: hidden; margin-bottom: 10px;
        }
        .input-field input, .input-field select { 
            flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 0.9rem;
        }
        .input-field span { 
            background: rgba(255,255,255,0.1); padding: 10px; font-size: 0.7rem; color: #94a3b8; min-width: 45px; text-align: center;
        }

        /* Buttons */
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-calc { background: var(--accent-cyan); color: #0f172a; width: 100%; margin-top: 10px; }
        .btn-pdf { background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); margin-top: 10px; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Dashboard Stats */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; text-align: center; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; display: block; color: #fff; }
        .stat-lbl { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-top: 5px; }

        #map { height: 300px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .status { font-weight: bold; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; }
        .status-pass { color: var(--success-green); background: rgba(16, 185, 129, 0.1); }
        .status-fail { color: var(--danger-red); background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1 style="margin:0; font-weight:800; font-size:1.5rem;">SOLAR MASTER <span style="color:var(--accent-cyan)">BLUE</span></h1>
        <div style="font-size:0.8rem; text-align:right;">Engineering Suite v12.0<br><span id="dateTime"></span></div>
    </header>

    <div id="map"></div>

    <div class="grid-inputs">
        <div class="panel">
            <h2>☀️ MODULE SPECS</h2>
            <label>Model Preset</label>
            <div class="input-field">
                <select id="pSel" onchange="applyPreset()">
                    <option value="custom">-- CUSTOM / MANUAL --</option>
                    <option value="jinko550">Jinko Tiger Pro 550W</option>
                    <option value="longi545">LONGi Hi-MO 5 545W</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Pmax (Wp)</label><div class="input-field"><input id="pWp" value="550"></div></div>
                <div><label>Voc (V)</label><div class="input-field"><input id="pVoc" value="49.8"></div></div>
                <div><label>Isc (A)</label><div class="input-field"><input id="pIsc" value="13.9"></div></div>
                <div><label>Vmp (V)</label><div class="input-field"><input id="pVmp" value="41.9"></div></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Qty (Panels)</label><div class="input-field"><input id="pQty" value="20"></div></div>
                <div><label>P/String</label><div class="input-field"><input id="pStr" value="10"></div></div>
            </div>
        </div>

        <div class="panel">
            <h2>🔌 INVERTER SPECS</h2>
            <label>Max DC Input Voltage</label>
            <div class="input-field"><input id="invMaxV" value="1100"><span>V</span></div>
            <label>MPPT Range</label>
            <div class="input-field"><input id="invMinM" value="160"><input id="invMaxM" value="950"><span>V</span></div>
            <label>Max Input Current (per MPPT)</label>
            <div class="input-field"><input id="invMaxI" value="15"><span>A</span></div>
            <button class="btn btn-calc" onclick="calculate()">🚀 CALCULATE SYSTEM</button>
        </div>

        <div class="panel">
            <h2>📝 PROJECT INFO</h2>
            <label>Client Name</label>
            <div class="input-field"><input id="custName" placeholder="Client Name"></div>
            <label>Project Budget (THB)</label>
            <div class="input-field"><input id="totalCost" value="350000"></div>
            <label>Branding Logo</label>
            <input type="file" id="logoInp" style="font-size:0.7rem; color:#94a3b8;">
            <button class="btn btn-pdf" onclick="exportPDF()">📄 EXPORT REPORT</button>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><span class="stat-lbl">System Size</span><span class="stat-val" id="resSize">0.00 <small>kWp</small></span></div>
        <div class="stat-card"><span class="stat-lbl">Yearly Yield</span><span class="stat-val" id="resYield">0 <small>kWh</small></span></div>
        <div class="stat-card"><span class="stat-lbl">Yearly Saving</span><span class="stat-val" id="resSave">฿ 0</span></div>
        <div class="stat-card"><span class="stat-lbl">Payback Period</span><span class="stat-val" id="resROI">0.0 <small>Yrs</small></span></div>
    </div>

    <div class="grid-inputs" style="grid-template-columns: 1fr 2fr;">
        <div class="panel">
            <h2>🛡️ VALIDATION</h2>
            <div id="vResult" style="font-size:0.85rem; line-height:1.8;">
                Click Calculate to check system safety...
            </div>
        </div>
        <div class="panel">
            <h2>📈 25-YEAR PERFORMANCE</h2>
            <div style="height:300px;"><canvas id="mainChart"></canvas></div>
        </div>
    </div>
</div>

<script>
let chart, map, marker, logoData = null;

window.onload = () => {
    map = L.map('map').setView([13.75, 100.5], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    marker = L.marker([13.75, 100.5], {draggable:true}).addTo(map);
    
    document.getElementById('logoInp').onchange = (e) => {
        let r = new FileReader(); r.onload = (el) => logoData = el.target.result;
        r.readAsDataURL(e.target.files[0]);
    };
    document.getElementById('dateTime').innerText = new Date().toLocaleString();
    calculate();
};

function applyPreset() {
    const db = { jinko550: [550, 49.8, 13.9, 41.9], longi545: [545, 49.5, 13.8, 41.6] };
    let c = db[document.getElementById('pSel').value];
    if(c) {
        ['pWp','pVoc','pIsc','pVmp'].forEach((id, i) => document.getElementById(id).value = c[i]);
    }
}

function calculate() {
    const g = (id) => parseFloat(document.getElementById(id).value) || 0;
    
    const size = (g('pWp') * g('pQty')) / 1000;
    const voc = g('pVoc') * g('pStr');
    const vmp = g('pVmp') * g('pStr');
    const isc = g('pIsc');

    // Efficiency Calc
    const pr = 0.81; // System Performance Ratio
    const yearlyKwh = size * 5.1 * 365 * pr;
    const saving = yearlyKwh * 4.7;
    const roi = g('totalCost') / saving;

    // UI Updates
    document.getElementById('resSize').innerHTML = `${size.toFixed(2)} <small>kWp</small>`;
    document.getElementById('resYield').innerHTML = `${Math.round(yearlyKwh).toLocaleString()} <small>kWh</small>`;
    document.getElementById('resSave').innerText = `฿ ${Math.round(saving).toLocaleString()}`;
    document.getElementById('resROI').innerHTML = `${roi.toFixed(1)} <small>Yrs</small>`;

    // Validation Status
    const vOk = voc < g('invMaxV');
    const mOk = vmp > g('invMinM') && vmp < g('invMaxM');
    const iOk = isc <= g('invMaxI');

    document.getElementById('vResult').innerHTML = `
        DC Voltage: ${voc.toFixed(1)}V <span class="status ${vOk?'status-pass':'status-fail'}">${vOk?'SAFE':'OVER'}</span><br>
        MPPT Range: ${vmp.toFixed(1)}V <span class="status ${mOk?'status-pass':'status-fail'}">${mOk?'OK':'OUT'}</span><br>
        Current: ${isc}A <span class="status ${iOk?'status-pass':'status-fail'}">${iOk?'SAFE':'LIMIT'}</span><br>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:10px 0;">
        Engineering Factor: PR 81% (Thai Standard)
    `;

    updateChart(yearlyKwh);
}

function updateChart(base) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], data = [];
    for(let i=1; i<=25; i++) {
        labels.push("Y" + i);
        data.push((base * Math.pow(0.995, i-1)).toFixed(0));
    }
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Generation (kWh)', data: data,
                borderColor: '#06b6d4', backgroundColor: 'rgba(6, 182, 212, 0.1)',
                fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFillColor(30, 58, 138); // Blue Header
    doc.rect(0, 0, 210, 40, 'F');
    if(logoData) doc.addImage(logoData, 'PNG', 170, 5, 30, 30);
    
    doc.setTextColor(255);
    doc.setFontSize(20); doc.text("SOLAR ENGINEERING MASTER REPORT", 15, 25);
    
    doc.autoTable({
        startY: 50,
        head: [['Engineering Item', 'Calculated Value']],
        body: [
            ['Customer Name', document.getElementById('custName').value || 'Project Client'],
            ['System Size', document.getElementById('resSize').innerText],
            ['Yearly Energy Yield', document.getElementById('resYield').innerText],
            ['Annual Saving', document.getElementById('resSave').innerText],
            ['Payback Period', document.getElementById('resROI').innerText]
        ],
        theme: 'striped', headStyles: {fillColor: [30, 58, 138]}
    });
    doc.save("Solar_Report.pdf");
}
</script>
</body>
</html>
