<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>⚡ Solar System Design</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
}
.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    max-width: 450px;
    margin: auto;
}
input {
    margin: 5px;
    padding: 8px;
    width: 90%;
}
button {
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>⚡ Solar System Design Calculator</h1>

<div class="box">

<input type="number" id="load" placeholder="โหลดไฟ (kWh/วัน)">
<input type="number" id="sun" placeholder="ค่าแดด (Peak Sun Hour)">
<input type="number" id="panel" placeholder="กำลังแผง (W)">
<input type="number" id="price" placeholder="ค่าไฟ (บาท/kWh)">
<input type="number" id="cost" placeholder="ค่าติดตั้ง (บาท)">

<br>
<button onclick="calc()">คำนวณ</button>

<h2 id="result"></h2>

</div>

<script>
function calc() {

let load = document.getElementById("load").value;
let sun = document.getElementById("sun").value;
let panel = document.getElementById("panel").value;
let price = document.getElementById("price").value;
let cost = document.getElementById("cost").value;

// ขนาดระบบ (kW)
let systemKW = load / sun;

// จำนวนแผง
let panels = (systemKW * 1000) / panel;

// พลังงานต่อปี
let yearly = load * 365;

// เงินที่ประหยัดได้/ปี
let saving = yearly * price;

// ROI (ปี)
let roi = cost / saving;

document.getElementById("result").innerHTML =
"🔋 ขนาดระบบ: " + systemKW.toFixed(2) + " kW<br>" +
"☀️ จำนวนแผง: " + Math.ceil(panels) + " แผง<br>" +
"⚡ พลังงาน/ปี: " + yearly.toFixed(0) + " kWh<br>" +
"💰 ประหยัด/ปี: " + saving.toFixed(0) + " บาท<br>" +
"📈 คืนทุน: " + roi.toFixed(1) + " ปี";
}
</script>

</body>
</html>
