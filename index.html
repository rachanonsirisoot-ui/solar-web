<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Solar Simulation Tool (Pro)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}
.container { max-width: 900px; margin:auto; }
.box {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}
.input-group { display:flex; margin:5px 0; }
.input-group input, select {
    flex:1; padding:10px; border:none;
}
.input-group span {
    background:#334155;
    padding:10px;
}
button {
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    color:white;
}
canvas { background:white; border-radius:10px; }
</style>
</head>

<body>
<div class="container">

<h1>⚡ Solar Simulation Tool</h1>

<div class="box">
<h2>🌍 Location</h2>
<div class="input-group"><input id="lat" placeholder="Latitude"><span>°</span></div>
<div class="input-group"><input id="lon" placeholder="Longitude"><span>°</span></div>
</div>

<div class="box">
<h2>☀️ System</h2>
<div class="input-group"><input id="panel" value="535"><span>W</span></div>
<div class="input-group"><input id="area" value="1000"><span>m²</span></div>
<div class="input-group"><input id="eff" value="80"><span>%</span></div>
</div>

<div class="box">
<h2>⚡ Loss</h2>
<div class="input-group"><input id="tempLoss" value="5"><span>% Temp</span></div>
<div class="input-group"><input id="soilingLoss" value="3"><span>% Dust</span></div>
<div class="input-group"><input id="invLoss" value="4"><span>% Inverter</span></div>
</div>

<div class="box">
<h2>💰 Financial</h2>
<div class="input-group"><input id="price" value="4"><span>บาท/kWh</span></div>
<div class="input-group"><input id="cost" value="1000000"><span>บาท</span></div>
</div>

<button onclick="calc()">⚡ Run Simulation</button>

<div class="box">
<h2>📊 Result</h2>
<div id="result"></div>
</div>

<div class="box">
<canvas id="chart"></canvas>
</div>

</div>

<script>

async function getSolar(lat, lon){
let url = `https://power.larc.nasa.gov/api/temporal/monthly/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude=${lon}&latitude=${lat}&format=JSON`;
let res = await fetch(url);
let data = await res.json();
return data.properties.parameter.ALLSKY_SFC_SW_DWN;
}

async function calc(){

let lat = document.getElementById("lat").value;
let lon = document.getElementById("lon").value;

let panel = document.getElementById("panel").value;
let area = document.getElementById("area").value;
let eff = document.getElementById("eff").value/100;

let tempLoss = document.getElementById("tempLoss").value/100;
let soilingLoss = document.getElementById("soilingLoss").value/100;
let invLoss = document.getElementById("invLoss").value/100;

let price = document.getElementById("price").value;
let cost = document.getElementById("cost").value;

// ===== NASA DATA =====
let solar = await getSolar(lat, lon);

// ===== MONTHLY CALC =====
let months = Object.keys(solar);
let energyMonthly = [];

let totalYear = 0;

months.forEach(m => {

let irr = solar[m]; // kWh/m2/day

let energy = irr * area * eff;

// Loss
energy *= (1 - tempLoss);
energy *= (1 - soilingLoss);
energy *= (1 - invLoss);

energyMonthly.push(energy.toFixed(0));
totalYear += energy;

});

// ===== PR =====
let PR = (1 - tempLoss - soilingLoss - invLoss);

// ===== FINANCE =====
let saving = totalYear * price;
let roi = cost / saving;

// ===== RESULT =====
document.getElementById("result").innerHTML =

"📍 Location: " + lat + ", " + lon + "<br><br>" +

"⚡ Annual Energy: " + totalYear.toFixed(0) + " kWh<br>" +
"📈 PR: " + (PR*100).toFixed(1) + "%<br>" +

"💰 Saving/year: " + saving.toFixed(0) + " บาท<br>" +
"⏳ ROI: " + roi.toFixed(1) + " ปี";

// ===== CHART =====
new Chart(document.getElementById("chart"), {
type: 'bar',
data: {
labels: months,
datasets: [{
label: 'kWh/month',
data: energyMonthly
}]
}
});

}

</script>

</body>
</html>
