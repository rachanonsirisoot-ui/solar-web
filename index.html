<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Solar Pro Ultimate Enterprise</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { 
            --primary: #10b981; --secondary: #6366f1; --danger: #ef4444; 
            --warning: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; 
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        h1, h2 { color: var(--primary); margin-top: 0; }
        .subtitle { color: #94a3b8; margin-top: -10px; margin-bottom: 25px; font-size: 0.9rem; }

        /* Map UI */
        #map { height: 400px; border-radius: 16px; border: 2px solid #334155; margin-bottom: 25px; z-index: 1; }

        /* Form Styling */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        .field-box { display: flex; background: #0f172a; border-radius: 10px; border: 1px solid #475569; overflow: hidden; }
        .field-box input, .field-box select, .field-box textarea { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
        .field-box span { background: #334155; padding: 12px; font-size: 0.8rem; min-width: 55px; text-align: center; }

        /* Status Badges */
        .status-badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-right: 10px; margin-bottom: 10px; }
        .status-pass { background: rgba(16, 185, 129, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        .status-fail { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }

        /* Action Buttons */
        .btn-group { display: flex; gap: 15px; margin: 30px 0; }
        button { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-calc { background: var(--primary); color: #064e3b; }
        .btn-pdf { background: var(--secondary); color: white; }
        button:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        #result-panel { font-family: 'Consolas', monospace; font-size: 0.95rem; line-height: 1.8; color: #5eead4; background: #020617; padding: 25px; border-radius: 16px; border-left: 6px solid var(--primary); }
        canvas { background: #1e293b; border-radius: 16px; padding: 15px; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center;">
        <h1>⚡ Solar Pro <span style="color:white">Ultimate Suite</span></h1>
        <p class="subtitle">ระบบออกแบบวิศวกรรมแสงอาทิตย์และวิเคราะห์การลงทุนระดับมืออาชีพ</p>
    </header>

    <div id="map"></div>

    <div class="grid">
        <div class="card">
            <h2>☀️ การออกแบบแผงโซลาร์</h2>
            <div class="input-group">
                <label>โมเดลแผงโซลาร์</label>
                <div class="field-box">
                    <select id="panelDb" onchange="updatePanelSpecs()">
                        <option value="custom">-- Custom Panel --</option>
                        <option value="jinko550">Jinko Tiger Pro 550W</option>
                        <option value="longi545">LONGi Hi-MO 5 545W</option>
                        <option value="trina600">Trina Vertex 600W</option>
                    </select>
                </div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group"><label>Pmax (Wp)</label><div class="field-box"><input id="pWp" value="550"></div></div>
                <div class="input-group"><label>Voc (V)</label><div class="field-box"><input id="pVoc" value="49.8"></div></div>
                <div class="input-group"><label>Isc (A)</label><div class="field-box"><input id="pIsc" value="13.9"></div></div>
                <div class="input-group"><label>Vmp (V)</label><div class="field-box"><input id="pVmp" value="41.9"></div></div>
                <div class="input-group"><label>จำนวนแผง</label><div class="field-box"><input id="pQty" value="20"></div></div>
                <div class="input-group"><label>แผงต่อ String</label><div class="field-box"><input id="pStr" value="10"></div></div>
            </div>
        </div>

        <div class="card">
            <h2>🔌 การตั้งค่าอินเวอร์เตอร์</h2>
            <div class="input-group"><label>เลือกแบรนด์</label>
                <div class="field-box">
                    <select id="invDb" onchange="updateInvSpecs()">
                        <option value="custom">-- Custom Inverter --</option>
                        <option value="huawei10">Huawei SUN2000-10KTL</option>
                        <option value="sungrow10">Sungrow SG10RT</option>
                        <option value="solis10">Solis S6-GR3P10K</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Max DC Input Voltage (V)</label>
                <div class="field-box"><input id="invMaxV" value="1100"><span>Vdc</span></div>
            </div>
            <div class="input-group">
                <label>MPPT Range (Min - Max)</label>
                <div class="field-box"><input id="invMinV" value="160"><input id="invMaxMppt" value="950"><span>Vdc</span></div>
            </div>
            <div class="input-group">
                <label>Max Input Current (A)</label>
                <div class="field-box"><input id="invMaxI" value="15"><span>A</span></div>
            </div>
        </div>

        <div class="card" style="border-color: var(--secondary);">
            <h2>📄 ข้อมูลโครงการ & PDF</h2>
            <div class="input-group"><label>ชื่อลูกค้า / โครงการ</label>
                <div class="field-box"><input id="custName" placeholder="เช่น คุณสมศรี"><input id="projName" placeholder="บ้านเดี่ยว 10kW"></div>
            </div>
            <div class="input-group"><label>เงินลงทุนทั้งหมด (CAPEX)</label>
                <div class="field-box"><input id="totalCost" value="350000"><span>฿</span></div>
            </div>
            <div class="input-group"><label>โลโก้บริษัท (URL)</label>
                <div class="field-box"><input id="logoUrl" placeholder="https://link-to-logo.png"></div>
            </div>
            <div class="input-group"><label>หมายเหตุเพิ่มเติม</label>
                <div class="field-box"><textarea id="notes" rows="2" placeholder="รับประกันอินเวอร์เตอร์ 10 ปี..."></textarea></div>
            </div>
        </div>
    </div>

    <input type="hidden" id="lat" value="13.75">
    <input type="hidden" id="lon" value="100.5">

    <div class="btn-group">
        <button class="btn-calc" onclick="runAnalysis()">🚀 เริ่มการคำนวณและตรวจสอบระบบ</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 ออกรายงาน PDF ระดับพรีเมียม</button>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1.5fr;">
        <div class="card">
            <h2>📝 สรุปการตรวจสอบทางวิศวกรรม</h2>
            <div id="result-panel">พร้อมสำหรับการคำนวณ...</div>
        </div>
        <div class="card">
            <h2>📈 กราฟผลผลิตและการประหยัด</h2>
            <canvas id="yieldChart" style="height:350px"></canvas>
        </div>
    </div>
</div>

<script>
let map, marker, chart, result;

// 1. Initial Setup
window.onload = () => {
    map = L.map('map').setView([13.75, 100.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([13.75, 100.5], {draggable: true}).addTo(map);
    
    map.on('click', e => updatePos(e.latlng.lat, e.latlng.lng));
    marker.on('dragend', e => updatePos(e.target.getLatLng().lat, e.target.getLatLng().lng));
};

function updatePos(lat, lng) {
    document.getElementById('lat').value = lat.toFixed(4);
    document.getElementById('lon').value = lng.toFixed(4);
    marker.setLatLng([lat, lng]);
}

// 2. Database Sim
function updatePanelSpecs() {
    const db = {
        jinko550: [550, 49.8, 13.9, 41.9],
        longi545: [545, 49.5, 13.8, 41.6],
        trina600: [600, 41.7, 18.4, 34.2]
    };
    const choice = document.getElementById('panelDb').value;
    if(db[choice]) {
        ['pWp', 'pVoc', 'pIsc', 'pVmp'].forEach((id, i) => document.getElementById(id).value = db[choice][i]);
    }
}

function updateInvSpecs() {
    const db = {
        huawei10: [1100, 160, 950, 15],
        sungrow10: [1100, 180, 1000, 12.5],
        solis10: [1000, 160, 850, 14]
    };
    const choice = document.getElementById('invDb').value;
    if(db[choice]) {
        ['invMaxV', 'invMinV', 'invMaxMppt', 'invMaxI'].forEach((id, i) => document.getElementById(id).value = db[choice][i]);
    }
}

// 3. Core Logic
async function runAnalysis() {
    const v = id => parseFloat(document.getElementById(id).value) || 0;
    
    // Engineering Validation
    const sysKWp = (v('pWp') * v('pQty')) / 1000;
    const strVoc = v('pVoc') * v('pStr');
    const strVmp = v('pVmp') * v('pStr');
    
    const voltOk = strVoc <= v('invMaxV');
    const mpptOk = strVmp >= v('invMinV') && strVmp <= v('invMaxMppt');
    const currentOk = v('pIsc') <= v('invMaxI');

    // Yield (NASA Fallback)
    const hsp = [5.1, 5.5, 5.8, 6.1, 5.4, 5.0, 4.8, 4.7, 4.6, 5.0, 5.1, 5.1];
    const pr = 0.80; // Performance Ratio
    let monthlyYield = hsp.map(h => (h * sysKWp * pr * 30.4).toFixed(1));
    let yearlySum = monthlyYield.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
    let yearlySaving = yearlySum * 4.7;

    // Display Result
    document.getElementById('result-panel').innerHTML = `
        <div class="status-badge ${voltOk ? 'status-pass' : 'status-fail'}">Voltage: ${voltOk ? 'PASS' : 'OVER'}</div>
        <div class="status-badge ${mpptOk ? 'status-pass' : 'status-fail'}">MPPT: ${mpptOk ? 'MATCH' : 'OUT'}</div>
        <div class="status-badge ${currentOk ? 'status-pass' : 'status-fail'}">Current: ${currentOk ? 'SAFE' : 'HIGH'}</div>
        <hr style="border-color:#334155; margin:15px 0">
        • ระบบรวม: ${sysKWp.toFixed(2)} kWp<br>
        • แรงดัน String (Voc): ${strVoc.toFixed(1)} V<br>
        • แรงดันทำงาน (Vmp): ${strVmp.toFixed(1)} V<br>
        • ผลิตไฟรายปี: ${yearlySum.toLocaleString()} kWh<br>
        • ประหยัดรายปี: ฿${yearlySaving.toLocaleString()}
    `;

    result = { sysKWp, strVoc, strVmp, yearlySum, yearlySaving, monthlyYield, voltOk, mpptOk };
    renderChart(monthlyYield);
}

function renderChart(data) {
    const ctx = document.getElementById('yieldChart').getContext('2d');
    if(chart) chart.destroy();
    
    const gradient = ctx.createLinearGradient(0,0,0,400);
    gradient.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
    gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{
                label: 'การผลิต (kWh)',
                data: data,
                borderColor: '#10b981',
                borderWidth: 4,
                tension: 0.4,
                fill: true,
                backgroundColor: gradient,
                pointRadius: 4,
                pointHoverRadius: 10
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });
}

function exportPDF() {
    if(!result) return alert("โปรดคำนวณก่อนออกรายงาน!");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const capex = parseFloat(document.getElementById('totalCost').value);

    // Styling & Header
    doc.setFillColor(15, 23, 42);
    doc.rect(0, 0, 210, 50, 'F');
    const logo = document.getElementById('logoUrl').value;
    if(logo) try { doc.addImage(logo, 'PNG', 160, 10, 30, 30); } catch(e){}

    doc.setTextColor(16, 185, 129);
    doc.setFontSize(24);
    doc.text("SOLAR ENGINEERING REPORT", 20, 25);
    doc.setTextColor(255);
    doc.setFontSize(10);
    doc.text(`CUSTOMER: ${document.getElementById('custName').value || 'N/A'}`, 20, 36);
    doc.text(`PROJECT: ${document.getElementById('projName').value || 'N/A'}`, 20, 42);

    // Table 1: Engineering
    doc.setTextColor(0);
    doc.setFontSize(14);
    doc.text("1. Technical Design Validation", 20, 65);
    doc.autoTable({
        startY: 70,
        head: [['หัวข้อ', 'ค่าที่ได้', 'สถานะ']],
        body: [
            ['System Capacity', result.sysKWp.toFixed(2) + ' kWp', 'OK'],
            ['Voltage Voc', result.strVoc.toFixed(1) + ' V', result.voltOk ? 'ผ่าน' : 'อันตราย'],
            ['MPPT Range Check', result.strVmp.toFixed(1) + ' V', result.mpptOk ? 'ปกติ' : 'ต่ำเกินไป'],
            ['Energy Yield (Yearly)', result.yearlySum.toLocaleString() + ' kWh', 'คาดการณ์']
        ],
        headStyles: { fillColor: [15, 23, 42] }
    });

    // Table 2: Financial
    doc.text("2. Investment & ROI Analysis", 20, doc.lastAutoTable.finalY + 15);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 20,
        head: [['ตัวชี้วัด', 'ค่าประมาณการ']],
        body: [
            ['เงินลงทุน (CAPEX)', capex.toLocaleString() + ' บาท'],
            ['เงินประหยัดได้ต่อปี', result.yearlySaving.toLocaleString() + ' บาท/ปี'],
            ['ระยะเวลาคืนทุน (Payback)', (capex / result.yearlySaving).toFixed(1) + ' ปี'],
            ['ประหยัดสะสม 25 ปี', (result.yearlySaving * 25).toLocaleString() + ' บาท']
        ],
        headStyles: { fillColor: [16, 185, 129] }
    });

    // Notes
    doc.text("3. หมายเหตุเพิ่มเติม", 20, doc.lastAutoTable.finalY + 15);
    doc.setFontSize(10);
    doc.text(doc.splitTextToSize(document.getElementById('notes').value || '-', 170), 20, doc.lastAutoTable.finalY + 25);

    doc.save(`Solar_Report_${Date.now()}.pdf`);
}
</script>
</body>
</html>
