<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Solar Pro | Ultra Stable Version</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #10b981; --secondary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        h1 { color: var(--primary); text-align: center; font-size: 2rem; }
        
        .field-label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        .input-box { display: flex; background: #0f172a; border-radius: 8px; border: 1px solid #475569; overflow: hidden; margin-bottom: 15px; }
        .input-box input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
        .input-box span { background: #334155; padding: 12px; font-size: 0.8rem; min-width: 60px; text-align: center; }

        .btn-group { display: flex; gap: 15px; margin: 20px 0; }
        button { flex: 1; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-main { background: var(--primary); color: #064e3b; }
        .btn-alt { background: var(--secondary); color: white; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #result { background: #020617; padding: 20px; border-radius: 12px; font-family: 'Consolas', monospace; border-left: 5px solid var(--primary); line-height: 1.8; color: #5eead4; }
        canvas { background: white; border-radius: 12px; padding: 15px; margin-top: 20px; width: 100% !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Solar Engineering <span style="color:white">Pro++</span></h1>

    <div class="grid">
        <div class="card">
            <h3 style="color: var(--primary)">☀️ System Spec</h3>
            <div class="field-label">ขนาดแผง (Wp)</div>
            <div class="input-box"><input id="pWp" value="550"><span>Wp</span></div>
            <div class="field-label">จำนวนแผง (Total)</div>
            <div class="input-box"><input id="pQty" value="20"><span>แผง</span></div>
            <div class="field-label">Voc ต่อแผง / จำนวนแผงต่อ String</div>
            <div class="input-box"><input id="pVoc" value="49.8"><input id="pStr" value="10"></div>
        </div>

        <div class="card">
            <h3 style="color: var(--primary)">🌍 Site & Finance</h3>
            <div class="field-label">พิกัด Lat / Lon</div>
            <div class="input-box"><input id="lat" value="13.75"><input id="lon" value="100.5"></div>
            <div class="field-label">งบประมาณโครงการ</div>
            <div class="input-box"><input id="cost" value="350000"><span>บาท</span></div>
            <div class="field-label">ค่าไฟฟ้าเฉลี่ย</div>
            <div class="input-box"><input id="ePrice" value="4.7"><span>฿/หน่วย</span></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-main" onclick="startSim()">⚡ ประมวลผลจำลองการผลิต</button>
        <button class="btn-alt" onclick="savePDF()">📄 ออกรายงาน PDF</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="color: var(--primary)">📋 ผลการวิเคราะห์</h3>
            <div id="result">ยังไม่มีข้อมูล...</div>
        </div>
        <div class="card">
            <h3 style="color: var(--primary)">📈 กราฟการผลิตรายเดือน</h3>
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
let myChart = null;
let reportData = {};

async function startSim() {
    const getVal = (id) => parseFloat(document.getElementById(id).value);
    
    const systemKWp = (getVal('pWp') * getVal('pQty')) / 1000;
    const stringVoc = getVal('pVoc') * getVal('pStr');
    
    let monthlyYield = [];
    let yearlySum = 0;
    const labels = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

    try {
        // ดึงข้อมูล NASA
        const url = `https://power.larc.nasa.gov/api/temporal/monthly/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude=${getVal('lon')}&latitude=${getVal('lat')}&format=JSON`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("API Error");
        const data = await res.json();
        const raw = data.properties.parameter.ALLSKY_SFC_SW_DWN;
        const hspValues = Object.values(raw).slice(0, 12);

        hspValues.forEach((hsp, i) => {
            let energy = hsp * systemKWp * 0.8 * new Date(2024, i+1, 0).getDate();
            monthlyYield.push(energy.toFixed(1));
            yearlySum += energy;
        });
        console.log("Using Real NASA Data");

    } catch (err) {
        // --- Fallback Data ถ้า API ล่ม ---
        console.warn("Using Fallback Thai Average Data");
        const fallbackHSP = [5.1, 5.4, 5.8, 6.0, 5.2, 4.8, 4.7, 4.6, 4.5, 4.9, 5.1, 5.0];
        fallbackHSP.forEach((hsp, i) => {
            let energy = hsp * systemKWp * 0.8 * new Date(2024, i+1, 0).getDate();
            monthlyYield.push(energy.toFixed(1));
            yearlySum += energy;
        });
        alert("⚠️ หมายเหตุ: ไม่สามารถเชื่อมต่อ NASA ได้ ระบบใช้ค่าเฉลี่ยแสงในไทยแทน");
    }

    const saving = yearlySum * getVal('ePrice');
    const roi = getVal('cost') / saving;

    // อัปเดตข้อความ
    document.getElementById('result').innerHTML = 
        `ขนาดติดตั้ง: ${systemKWp.toFixed(2)} kWp\n` +
        `ผลิตไฟฟ้าได้: ${yearlySum.toLocaleString(undefined,{maximumFractionDigits:0})} หน่วย/ปี\n` +
        `ประหยัดเงิน: ${saving.toLocaleString(undefined,{maximumFractionDigits:0})} บาท/ปี\n` +
        `จุดคุ้มทุน: ${roi.toFixed(1)} ปี\n` +
        `แรงดัน String: ${stringVoc.toFixed(1)} V ${stringVoc > 1000 ? '<br><b style="color:red">⚠️ อันตราย: Volt เกิน!</b>' : ''}`;

    // อัปเดตกราฟ
    renderChart(labels, monthlyYield);
    reportData = { systemKWp, yearlySum, saving, roi, monthlyYield };
}

function renderChart(labels, data) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{ label: 'พลังงานที่ผลิตได้ (kWh)', data: data, backgroundColor: '#10b981' }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

function savePDF() {
    if (!reportData.yearlySum) return alert("กรุณากดคำนวณก่อน!");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Solar Engineering Report Summary", 20, 20);
    doc.text(`System Size: ${reportData.systemKWp} kWp`, 20, 40);
    doc.text(`Annual Energy: ${reportData.yearlySum.toFixed(0)} kWh`, 20, 50);
    doc.text(`Annual Saving: ${reportData.saving.toFixed(0)} THB`, 20, 60);
    doc.text(`Payback: ${reportData.roi.toFixed(1)} Years`, 20, 70);
    doc.save("solar-report.pdf");
}
</script>
</body>
</html>
